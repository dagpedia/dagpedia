site_name: DAGpedia
site_url: https://dagpedia.org
site_description: >
  A living repository of causal DAGs for epidemiology —
  annotated with evidence levels, versioned, and open to contribution.
repo_url: https://github.com/dagpedia/dagpedia
repo_name: dagpedia/dagpedia
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - awesome-pages
  - tags

extra_javascript:
  - javascripts/dagitty.js
  - javascripts/dagitty-render.js

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - meta
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: dagitty
          class: dagitty-code
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - footnotes
