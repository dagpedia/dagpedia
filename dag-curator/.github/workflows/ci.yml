name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./dag-curator

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: dag-curator/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Use dummy values for build-time checks
          NEXTAUTH_SECRET: "ci-secret"
          NEXTAUTH_URL: "http://localhost:3000"
          GITHUB_CLIENT_ID: "ci"
          GITHUB_CLIENT_SECRET: "ci"
          DATABASE_URL: "file:./ci.db"
          ANTHROPIC_API_KEY: "sk-ant-ci"
          GITHUB_TOKEN: "ghp_ci"
          DAGPEDIA_REPO: "dagpedia/dagpedia"
