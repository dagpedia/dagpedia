name: Validate & Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pyyaml aiohttp

      - name: Validate nodes
        run: python scripts/nodes/validate_nodes.py --all
        env:
          SKIP_MESH_VALIDATION: ${{ github.event_name == 'pull_request' && '1' || secrets.SKIP_MESH_VALIDATION }}

      - name: Validate DAGs
        run: python scripts/dag/validate_dag.py --all

      - name: Validate ADRs and refresh docs/MAP.md
        run: |
          python scripts/docs/validate_adr.py --all
          git diff --exit-code docs/MAP.md

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Build check
        run: |
          npm ci
          npm run build

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: npx vercel@latest --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
