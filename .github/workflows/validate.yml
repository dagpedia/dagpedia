name: Validate DAGs

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate all DAG files
        run: python scripts/validate_dag.py docs/dags/

      - name: Check template is not submitted as a DAG
        run: |
          if ls docs/dags/**/dag-template.md 2>/dev/null; then
            echo "ERROR: dag-template.md should not be in docs/dags/"
            exit 1
          fi

  build-preview:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site (dry run)
        run: mkdocs build --strict

      - name: Verify dagitty custom fence output
        run: |
          # Keep this page explicit: issue completion criteria requires SES→CVD DAG rendering.
          HTML=site/dags/epidemiology/ses-cvd-classic/index.html
          test -f "$HTML" || { echo "Missing built SES→CVD page: $HTML"; exit 1; }
          grep -q '<div class="dagitty-code">' "$HTML" || {
            echo "Expected dagitty custom fence output (<div class=\"dagitty-code\">) not found in $HTML";
            exit 1;
          }
          RENDER_JS=site/javascripts/dagitty-render.js
          test -f "$RENDER_JS" || { echo "Missing built renderer script: $RENDER_JS"; exit 1; }
          grep -q 'div.dagitty-code' "$RENDER_JS" || {
            echo "Built dagitty-render.js no longer selects div.dagitty-code blocks";
            exit 1;
          }
