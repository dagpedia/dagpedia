name: Validate DAGs

on:
  pull_request:
    paths:
      - "docs/**"
      - "_templates/**"
      - "scripts/**"
      - "mkdocs.yml"
      - "requirements.txt"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate all DAG files
        run: python scripts/validate_dag.py docs/dags/

      - name: Check template is not submitted as a DAG
        run: |
          if ls docs/dags/**/dag-template.md 2>/dev/null; then
            echo "ERROR: dag-template.md should not be in docs/dags/"
            exit 1
          fi

  build-preview:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site (dry run)
        run: mkdocs build --strict

      - name: Verify dagitty custom fence output
        run: |
          HTML=site/dags/epidemiology/ses-cvd-classic/index.html
          test -f "$HTML"
          grep -q '<div class="dagitty-code">' "$HTML"
          grep -q 'div.dagitty-code' docs/javascripts/dagitty-render.js
