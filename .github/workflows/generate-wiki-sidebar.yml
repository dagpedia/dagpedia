name: Regenerate Wiki Sidebar

on:
  gollum:          # fires whenever any wiki page is created or edited

jobs:
  generate-wiki-sidebar:
    runs-on: ubuntu-latest
    steps:
      - name: Clone wiki
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git wiki
          cd wiki
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Copy wiki sidebar generator
        run: cp scripts/generate_wiki_sidebar.py wiki/

      - name: Generate wiki sidebar
        run: |
          cd wiki
          python3 generate_wiki_sidebar.py
          rm generate_wiki_sidebar.py   # don't leave the script in the wiki

      - name: Commit and push (if changed)
        run: |
          cd wiki
          git diff --quiet _Sidebar.md && echo "No changes." && exit 0
          git add _Sidebar.md
          git commit -m "chore: auto-regenerate _Sidebar.md"
          git push
