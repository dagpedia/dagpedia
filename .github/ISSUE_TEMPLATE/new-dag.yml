name: Add New DAG
description: Propose a new causal DAG for DAGpedia
title: "[DAG] <exposure> and <outcome>"
labels: ["new-dag"]
body:
  - type: input
    id: dag_id
    attributes:
      label: DAG ID (slug)
      description: "kebab-case: exposure-outcome-context"
      placeholder: ses-cvd-classic
    validations:
      required: true

  - type: dropdown
    id: evidence_level
    attributes:
      label: Evidence Level
      options:
        - strong
        - moderate
        - limited
        - theoretical
    validations:
      required: true

  - type: textarea
    id: nodes_used
    attributes:
      label: Nodes used
      description: "List node keys. If any are new, open a separate Node PR first."
      placeholder: |
        - socioeconomic_status
        - cardiovascular_disease
    validations:
      required: true

  - type: textarea
    id: dagitty_string
    attributes:
      label: DAG (dagitty syntax)
      render: shell
      placeholder: |
        dag {
          exposure -> outcome
        }
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: Key references (PMID or DOI)
      placeholder: |
        pmid: 12345678
        doi: 10.xxxx/xxxxx
