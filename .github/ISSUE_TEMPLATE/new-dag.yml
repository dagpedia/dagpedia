name: Add New DAG
description: Propose a new causal DAG for DAGpedia
title: "[DAG] <exposure> and <outcome>"
labels: ["new-dag"]
body:
  - type: input
    id: dag_id
    attributes:
      label: DAG ID (slug)
      description: "kebab-case, matches filename: src/content/dags/<id>.md"
      placeholder: ses-cvd-classic
    validations:
      required: true

  - type: dropdown
    id: population
    attributes:
      label: Context — population
      options:
        - general-adults
        - children-adolescents
        - older-adults
        - pregnant-persons
        - clinical-population
    validations:
      required: true

  - type: textarea
    id: nodes_used
    attributes:
      label: Nodes used (dagitty node ids)
      description: "Must exist in src/content/nodes/. Open a Node PR first for new keys."
      placeholder: |
        - socioeconomic_status
        - cardiovascular_disease
    validations:
      required: true

  - type: textarea
    id: dagitty_string
    attributes:
      label: DAG (dagitty in frontmatter)
      description: "Use [exposure] and [outcome] only. No [mediator]/[covariate]."
      render: shell
      placeholder: |
        dagitty: |
          dag {
            exposure [exposure]
            outcome [outcome]
            exposure -> outcome
          }
    validations:
      required: true

  - type: textarea
    id: edge_evidence
    attributes:
      label: Per-edge evidence (frontmatter)
      description: "One line per edge: from -> to: strong|moderate|weak|conflicting|expert-opinion"
      placeholder: |
        exposure -> outcome: moderate
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: Key references (for Edge rationale section)
      placeholder: |
        doi: 10.xxxx/xxxxx
        pmid: 12345678
